<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 세무 상담봇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2044; --navy-light: #1a3560;
    --gold: #c9a84c; --gold-light: #e8c96a;
    --cream: #f9f5ee; --cream-dark: #ede8df;
    --text: #1e1e2e; --text-muted: #6b7280;
    --white: #ffffff; --border: #d9d0be;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px);
    pointer-events: none; z-index: 0;
  }
  .hero { position: relative; z-index: 1; text-align: center; max-width: 640px; width: 100%; animation: fadeUp 0.8s ease both; }
  .badge { display: inline-block; background: var(--navy); color: var(--gold); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 20px; }
  h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(28px,5vw,40px); color: var(--navy); font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
  h1 span { color: var(--gold); }
  .subtitle { color: var(--text-muted); font-size: 15px; line-height: 1.7; margin-bottom: 36px; }
  .open-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--navy); color: var(--white); border: none; padding: 16px 36px; border-radius: 4px; font-size: 16px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden; }
  .open-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; }
  .open-btn:hover::before { transform: scaleX(1); }
  .open-btn:hover { color: var(--navy); }
  .open-btn span, .open-btn svg { position: relative; z-index: 1; }
  .features { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
  .feature-tag { background: var(--white); border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
  .feature-tag::before { content: '✓'; color: var(--gold); font-weight: 700; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(15,32,68,0.55); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; justify-content: center; padding: 20px; }
  .overlay.active { display: flex; animation: fadeIn 0.2s ease; }
  .chat-window { background: var(--white); width: 100%; max-width: 600px; height: 80vh; max-height: 700px; border-radius: 16px 16px 0 0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -8px 48px rgba(15,32,68,0.2); animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
  .chat-header { background: var(--navy); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 38px; height: 38px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .chat-title { font-family: 'Noto Serif KR', serif; color: var(--white); font-size: 14px; font-weight: 600; }
  .chat-status { font-size: 11px; color: var(--gold-light); display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
  .kakao-btn { background: #FEE500; color: #3C1E1E; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; padding: 3px 10px; border-radius: 10px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
  .kakao-btn:hover { background: #F5DC00; }
  .close-btn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 22px; line-height: 1; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
  .close-btn:hover { color: var(--white); }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: var(--cream); }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .msg.bot .msg-avatar { background: var(--navy); }
  .msg.user .msg-avatar { background: var(--gold); }
  .msg-bubble { max-width: 80%; padding: 12px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; color: var(--text); }
  .msg.bot .msg-bubble { background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--navy); color: var(--white); border-bottom-right-radius: 4px; }
  .msg-bubble a { color: var(--gold); text-decoration: underline; font-size: 12px; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 16px 12px; background: var(--cream); }
  .quick-btn { background: var(--white); border: 1px solid var(--border); color: var(--navy); font-size: 12px; font-family: 'Noto Sans KR', sans-serif; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .quick-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .input-area { padding: 12px 16px; background: var(--white); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; resize: none; outline: none; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; color: var(--text); background: var(--cream); }
  textarea:focus { border-color: var(--navy); }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn { width: 42px; height: 42px; background: var(--navy); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: var(--navy-light); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .typing { display: flex; gap: 4px; padding: 12px 14px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  .disclaimer { font-size: 10px; color: var(--text-muted); text-align: center; padding: 6px 16px 8px; background: var(--white); border-top: 1px solid var(--cream-dark); line-height: 1.5; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); } 40%{ transform:translateY(-6px); } }
  @media (max-width: 480px) { .overlay { padding: 0; } .chat-window { max-height: 100vh; height: 90vh; border-radius: 16px 16px 0 0; } }
</style>
</head>
<body>

<div class="hero">
  <div class="badge">AI · Tax Consultation</div>
  <h1>세무 궁금증,<br><span>지금 바로</span> 물어보세요</h1>
  <p class="subtitle">법인세·소득세·부가세·조특법까지<br>국내 세법 기반의 AI 세무 상담 서비스입니다</p>
  <button class="open-btn" onclick="openChat()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>AI 세무 상담 시작하기</span>
  </button>
  <div class="features">
    <div class="feature-tag">법인세·소득세</div>
    <div class="feature-tag">부가가치세</div>
    <div class="feature-tag">조특법 세액공제</div>
    <div class="feature-tag">관련 법령 안내</div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="avatar">⚖️</div>
        <div>
          <div class="chat-title">회계법인 브릿지 강남지점 AI 상담</div>
          <div class="chat-status">
            <span class="status-dot"></span>상담 가능
            <a href="https://open.kakao.com/o/s8oWsfpi" target="_blank" class="kakao-btn">💬 카카오톡 상담</a>
          </div>
        </div>
      </div>
      <button class="close-btn" onclick="closeChat()">×</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="quick-btns" id="quickBtns">
      <button class="quick-btn" onclick="sendQuick('법인세 신고 방법이 궁금해요')">📋 법인세 신고</button>
      <button class="quick-btn" onclick="sendQuick('고용세액공제 요건이 어떻게 되나요?')">👥 고용세액공제</button>
      <button class="quick-btn" onclick="sendQuick('부가세 매입세액 공제 안 되는 항목은?')">🧾 매입세액 불공제</button>
      <button class="quick-btn" onclick="sendQuick('원천세 신고 방법이 궁금해요')">📋 원천세 신고</button>
      <button class="quick-btn" onclick="sendQuick('접대비 한도 계산 방법은?')">💼 접대비 한도</button>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="세무 관련 궁금한 점을 입력하세요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="disclaimer">※ AI 답변은 참고용이며 법적 효력이 없습니다. 정확한 세무 판단은 회계사와 상담하세요.</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 대한민국 세법 전문 AI 세무 상담사입니다.

답변 규칙:
- 핵심 내용만 간결하게 3~5문장으로 요약
- 법령 조문번호만 명시 (예: 법인세법 §24, 조특법 §29의8) — 법령 원문은 절대 인용하지 않음
- 실무 유의사항 1~2줄로 요약
- 불확실한 내용은 추측하지 말고 답변의 마지막에 정확한 상담은 이정민 회계사(https://open.kakao.com/o/s1fQckpi) 링크 안내
- 유권해석·판례는 실제 존재하는 것만 인용
- 한국어, 일반 텍스트로만 답변 (마크다운 금지)
- 답변은 반드시 완성된 문장으로 끝낼 것`;

let messages = [], isLoading = false, chatOpened = false;

function openChat() {
  document.getElementById('overlay').classList.add('active');
  if (!chatOpened) {
    chatOpened = true;
    setTimeout(() => addBotMessage('안녕하세요! 👋\n회계법인 브릿지 강남지점 AI 상담봇입니다.\n\n법인세·소득세·부가세·조특법 세액공제 등 세무 관련 궁금한 점을 편하게 질문해 주세요.\n전문 회계사 상담이 필요하신 경우 카카오톡 버튼을 눌러주세요.'), 300);
  }
}

function closeChat() { document.getElementById('overlay').classList.remove('active'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeChat(); }

function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="msg-bubble">${formatText(text)}</div>`;
  msgs.appendChild(div); scrollBottom();
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-avatar">👤</div>`;
  msgs.appendChild(div); scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div); scrollBottom();
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scrollBottom() { const m = document.getElementById('messages'); setTimeout(() => m.scrollTop = m.scrollHeight, 50); }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function formatText(t) { return escapeHtml(t).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
function sendQuick(text) { document.getElementById('userInput').value=text; sendMessage(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  addUserMessage(text);
  messages.push({ role: 'user', parts: [{ text }] });
  document.getElementById('quickBtns').style.display = 'none';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const contents = messages.map((m, i) =>
      i === 0 && m.role === 'user'
        ? { role: 'user', parts: [{ text: SYSTEM_PROMPT + '\n\n사용자 질문: ' + m.parts[0].text }] }
        : m
    );

    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: contents })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message || data.error);
    }

    if (res.status === 429) {
      removeTyping();
      addBotMessage('⏳ 잠시 요청이 많습니다. 급하신 경우 카카오톡 상담을 이용해 주세요.');
      return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) throw new Error('응답 없음');

    messages.push({ role: 'model', parts: [{ text: reply }] });
    removeTyping();
    addBotMessage(reply);

  } catch(err) {
    removeTyping();
    console.error(err);
    addBotMessage('일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.\n\n급하신 경우 카카오톡 상담을 이용해 주세요.');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
